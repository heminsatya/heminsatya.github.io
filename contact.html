    <!-- Contact page -->
    <section class="page-description bg-white">
        <div class="container py-5">
            <p id="form-result"></p>
            <form method="get" action="contact.html" enctype="text/html" id="contact-form">
                <p>
                    You can use the following form for sending me your message.
                </p>
                <div class="row">
                    <div class="col-12 col-md-6">
                        <div class="form-group">
                            <label>*Your Name</label>
                            <input type="text" class="form-control" name="name">
                            <span class="text-info"></span>
                        </div>
                        <div class="form-group">
                            <label>*Email address</label>
                            <input type="email" class="form-control" name="email">
                            <span class="text-info"></span>
                        </div>
                        <div class="form-group">
                            <label>*Subject</label>
                            <input type="text" class="form-control" name="subject">
                            <span class="text-info"></span>
                        </div>
                    </div>
                    <div class="col-12 col-md-6">
                        <div class="form-group">
                            <label>*Message</label>
                            <textarea class="form-control" rows="8" name="message"></textarea>
                            <span class="text-info"></span>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-custom mt-2">SUBMIT</button>
            </form>

        </div>
    </section>

    <script>
    // Document loaded
    document.addEventListener('DOMContentLoaded', function() {
        // Main content height
        const windowHeight = window.innerHeight;
        const headerHeight = document.querySelector('.header').getBoundingClientRect().height;
        const footerHeight = document.querySelector('.footer').getBoundingClientRect().height;
        const mainHeight = document.querySelector('.main').getBoundingClientRect().height;
        const descriptionHeight = windowHeight - (headerHeight + mainHeight + footerHeight)
        
        document.querySelector('.page-description').style.minHeight = descriptionHeight + 'px';
    });
